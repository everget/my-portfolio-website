services:
    app:
        image: node:22-alpine
        container_name: frontend
        working_dir: /app
        env_file:
            - .env
        volumes:
            - .:/app
            - node_modules:/app/node_modules
        ports:
            - '${VITE_DEV_PORT}:${VITE_DEV_PORT}'
        command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm run dev"

volumes:
    node_modules:
