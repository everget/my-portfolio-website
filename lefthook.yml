# https://lefthook.dev/configuration/
# Run `pnpm exec lefthook install` once after pulling this file.

assert_lefthook_installed: true
no_tty: false
colors: true

# ---------------------------------------------------------------------------
# pre-commit: lint + format only staged files; run tsc project-wide once.
# ---------------------------------------------------------------------------
pre-commit:
    parallel: true
    jobs:
        - name: types:check
          glob: '*.{js,mjs,cjs,jsx,ts,mts,cts,tsx}'
          run: pnpm run types:check

        - name: lint:js
          glob: '*.{js,mjs,cjs,jsx,ts,mts,cts,tsx}'
          run: pnpm exec oxlint --fix {staged_files}
          stage_fixed: true

        - name: lint:styles
          glob: '*.{css,scss,sass,less,styl}'
          run: pnpm exec stylelint --cache --fix --allow-empty-input {staged_files}
          stage_fixed: true

        - name: format
          run: pnpm run format
          stage_fixed: true

# ---------------------------------------------------------------------------
# commit-msg: lint the commit message via commitlint.
# ---------------------------------------------------------------------------
commit-msg:
    jobs:
        - name: commitlint
          run: pnpm exec commitlint --edit {1}

